name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-floor:
    name: Node floor (22.13.0)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.13.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  frontend:
    name: Frontend checks
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.12.0
      - name: Install dependencies
        shell: bash
        run: |
          if [[ -f pnpm-lock.yaml ]]; then
            pnpm install --frozen-lockfile
          else
            echo "::warning::pnpm-lock.yaml is missing; releases must commit a lockfile"
            pnpm install --no-frozen-lockfile
          fi
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - name: Share the verified frontend with native jobs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-dist
          path: dist
          if-no-files-found: error
          retention-days: 1

  rust:
    name: Rust (${{ matrix.os }})
    needs: frontend
    env:
      MACOSX_DEPLOYMENT_TARGET: '15.0'
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - windows-2022
          - macos-14
          - macos-15
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Restore the verified frontend
        if: matrix.os != 'macos-14'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-dist
          path: dist
      - name: Install Linux desktop libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        if: matrix.os != 'macos-14'
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - if: matrix.os != 'macos-14'
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - if: matrix.os != 'macos-14'
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
      - if: matrix.os != 'macos-14'
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-features
      - name: Preserve the legacy macOS ruleset context during migration
        if: matrix.os == 'macos-14'
        run: echo 'Temporary bridge only; macOS 15 is the supported and tested floor.'
      - name: Generated TypeScript contracts are current
        if: runner.os == 'Linux'
        run: |
          cargo run --manifest-path src-tauri/Cargo.toml --bin export_bindings
          git diff --exit-code -- src/lib/bindings.ts

  sandbox-containment:
    name: Sandbox containment (${{ matrix.os }})
    needs: frontend
    env:
      MACOSX_DEPLOYMENT_TARGET: '15.0'
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - windows-2022
          - macos-14
          - macos-15
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Restore the verified frontend
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-dist
          path: dist
      - name: Install Linux containment build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf meson libcap-dev libseccomp-dev musl-tools
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.95.0
      - name: Install static Linux fixture target
        if: runner.os == 'Linux'
        run: rustup target add x86_64-unknown-linux-musl
      - name: Build pinned bubblewrap and seccomp policy
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/setwright-bwrap"
          git -C "$RUNNER_TEMP/setwright-bwrap" init
          git -C "$RUNNER_TEMP/setwright-bwrap" remote add origin https://github.com/containers/bubblewrap.git
          git -C "$RUNNER_TEMP/setwright-bwrap" fetch --depth 1 origin refs/tags/v0.11.0
          git -C "$RUNNER_TEMP/setwright-bwrap" checkout --detach 9ca3b05ec787acfb4b17bed37db5719fa777834f
          test "$(git -C "$RUNNER_TEMP/setwright-bwrap" rev-parse HEAD)" = 9ca3b05ec787acfb4b17bed37db5719fa777834f
          meson setup "$RUNNER_TEMP/setwright-bwrap/build" "$RUNNER_TEMP/setwright-bwrap" \
            -Dselinux=disabled -Dtests=false -Dman=disabled \
            -Dbash_completion=disabled -Dzsh_completion=disabled
          meson compile -C "$RUNNER_TEMP/setwright-bwrap/build" bwrap
          cc tools/sandbox/linux_seccomp_filter.c -lseccomp -o "$RUNNER_TEMP/make-setwright-seccomp"
          "$RUNNER_TEMP/make-setwright-seccomp" "$RUNNER_TEMP/setwright-seccomp.bpf"
          "$RUNNER_TEMP/setwright-bwrap/build/bwrap" --version
          sha256sum "$RUNNER_TEMP/setwright-bwrap/build/bwrap" "$RUNNER_TEMP/setwright-seccomp.bpf"
      - name: Build static Linux hostile helper
        if: runner.os == 'Linux'
        run: cargo build --locked --manifest-path tools/sandbox/hostile-fixture/Cargo.toml --target x86_64-unknown-linux-musl
      - name: Assemble test-signed macOS XPC host
        if: runner.os == 'macOS' && matrix.os != 'macos-14'
        timeout-minutes: 15
        shell: bash
        run: |
          set -euo pipefail
          cargo build --manifest-path src-tauri/Cargo.toml --bin sandbox-hostile-fixture
          cargo test --manifest-path src-tauri/Cargo.toml --test sandbox_containment --no-run
          test_binary=$(find src-tauri/target/debug/deps -type f -name 'sandbox_containment-*' -perm -111 | head -n 1)
          test -n "$test_binary"

          app="$RUNNER_TEMP/SetwrightContainment.app"
          service="$app/Contents/XPCServices/SetwrightCompilerXPC.xpc"
          runtime_root="$service/Contents/Resources/tex-runtime"
          mkdir -p "$app/Contents/MacOS" \
            "$service/Contents/MacOS" "$service/Contents/Resources"
          cp src-tauri/native/macos/ContainmentHost-Info.plist "$app/Contents/Info.plist"
          cp "$test_binary" "$app/Contents/MacOS/SetwrightContainment"
          cp src-tauri/native/macos/SetwrightCompilerXPC/Info.plist "$service/Contents/Info.plist"

          xcrun clang -mmacosx-version-min=15.0 \
            src-tauri/native/macos/SetwrightCompilerXPC/tex_launcher.c \
            -o "$service/Contents/Resources/setwright-tex-launcher"

          keychain="$RUNNER_TEMP/setwright-test-signing.keychain-db"
          keychain_password="$(uuidgen)"
          signing_config=src-tauri/native/macos/SetwrightCompilerXPC/test-signing.cnf
          openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
            -subj '/CN=Setwright CI Test Root/O=Setwright/' \
            -config "$signing_config" -extensions test_root \
            -keyout "$RUNNER_TEMP/setwright-test-root.key" \
            -out "$RUNNER_TEMP/setwright-test-root.crt"
          root_sha1="$(openssl x509 -in "$RUNNER_TEMP/setwright-test-root.crt" \
            -noout -fingerprint -sha1 | sed 's/^[^=]*=//;s/://g')"
          test "${#root_sha1}" = 40
          requirements_header="$RUNNER_TEMP/setwright-signing-requirements.h"
          {
            printf '#define SETWRIGHT_HOST_REQUIREMENT "certificate root = H\\"%s\\" and identifier \\"org.setwright.desktop\\""\n' "$root_sha1"
            printf '#define SETWRIGHT_HELPER_REQUIREMENT "certificate root = H\\"%s\\" and entitlement[\\"com.apple.security.inherit\\"] exists"\n' "$root_sha1"
          } > "$requirements_header"
          printf -v host_requirement \
            'certificate root = H"%s" and identifier "org.setwright.desktop"' \
            "$root_sha1"
          printf -v helper_requirement \
            'certificate root = H"%s" and entitlement["com.apple.security.inherit"] exists' \
            "$root_sha1"
          printf -v service_requirement \
            'certificate root = H"%s" and identifier "org.setwright.desktop.compiler-xpc"' \
            "$root_sha1"
          xcrun clang -fblocks -mmacosx-version-min=15.0 \
            -include "$requirements_header" \
            src-tauri/native/macos/SetwrightCompilerXPC/service.m \
            -framework Foundation -framework Security \
            -o "$service/Contents/MacOS/SetwrightCompilerXPC"
          openssl req -new -newkey rsa:2048 -nodes \
            -subj '/CN=Setwright CI Test Signing/OU=SETWRIGHTCI/O=Setwright/' \
            -keyout "$RUNNER_TEMP/setwright-test-signing.key" \
            -out "$RUNNER_TEMP/setwright-test-signing.csr"
          openssl x509 -req -days 1 -set_serial 1 \
            -in "$RUNNER_TEMP/setwright-test-signing.csr" \
            -CA "$RUNNER_TEMP/setwright-test-root.crt" \
            -CAkey "$RUNNER_TEMP/setwright-test-root.key" \
            -extfile "$signing_config" -extensions code_signing_leaf \
            -out "$RUNNER_TEMP/setwright-test-signing.crt"
          pkcs12_legacy=''
          if openssl pkcs12 -help 2>&1 | grep -q -- '-legacy'; then
            pkcs12_legacy='-legacy'
          fi
          openssl pkcs12 -export $pkcs12_legacy \
            -inkey "$RUNNER_TEMP/setwright-test-signing.key" \
            -in "$RUNNER_TEMP/setwright-test-signing.crt" \
            -certfile "$RUNNER_TEMP/setwright-test-root.crt" \
            -passout "pass:$keychain_password" \
            -out "$RUNNER_TEMP/setwright-test-signing.p12"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$RUNNER_TEMP/setwright-test-signing.p12" \
            -k "$keychain" -P "$keychain_password" -T /usr/bin/codesign
          sudo -n security add-trusted-cert -d -r trustRoot \
            -k /Library/Keychains/System.keychain \
            "$RUNNER_TEMP/setwright-test-root.crt"
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain"
          security default-keychain -d user -s "$keychain"
          security find-identity -v -p codesigning "$keychain"
          identity="$(security find-identity -v -p codesigning "$keychain" | \
            awk '/Setwright CI Test Signing/ { print $2; exit }')"
          test -n "$identity"

          helper_entitlements=src-tauri/native/macos/SetwrightCompilerXPC/helper.entitlements
          service_entitlements=src-tauri/native/macos/SetwrightCompilerXPC/service.entitlements
          codesign --force --keychain "$keychain" --sign "$identity" \
            --identifier org.setwright.desktop.tex-launcher \
            --entitlements "$helper_entitlements" \
            "$service/Contents/Resources/setwright-tex-launcher"
          codesign --force --keychain "$keychain" --sign "$identity" \
            --identifier org.setwright.hostile-fixture \
            --entitlements "$helper_entitlements" \
            src-tauri/target/debug/sandbox-hostile-fixture

          SETWRIGHT_PREPARE_FIXTURE_RUNTIME=1 \
          SETWRIGHT_XPC_RUNTIME_ROOT="$runtime_root" \
          SETWRIGHT_HOSTILE_FIXTURE_PATH="$PWD/src-tauri/target/debug/sandbox-hostile-fixture" \
            "$test_binary" native_hostile_fixture_containment_remains_incomplete_attestation --nocapture
          codesign --force --keychain "$keychain" --sign "$identity" \
            --identifier org.setwright.desktop.compiler-xpc \
            --entitlements "$service_entitlements" "$service"
          codesign --force --keychain "$keychain" --sign "$identity" \
            --identifier org.setwright.desktop "$app"
          codesign --verify --strict -R="$host_requirement" "$app"
          codesign --verify --strict -R="$service_requirement" "$service"
          codesign --verify --strict -R="$helper_requirement" \
            "$service/Contents/Resources/setwright-tex-launcher"
          codesign --verify --strict -R="$helper_requirement" \
            "$runtime_root/texlive-2025.2025-08-03-macos-aarch64/bin/latexmk"
          codesign --verify --deep --strict --verbose=2 "$app"
          codesign --display --verbose=4 "$service"
          codesign --display --entitlements - "$service"
          codesign --verify --strict --verbose=2 "$service/Contents/Resources/setwright-tex-launcher"
          codesign --display --verbose=4 "$service/Contents/Resources/setwright-tex-launcher"
          codesign --display --entitlements - --requirements - "$service/Contents/Resources/setwright-tex-launcher"
          codesign --verify --strict --verbose=2 "$runtime_root/texlive-2025.2025-08-03-macos-aarch64/bin/latexmk"
          codesign --display --verbose=4 "$runtime_root/texlive-2025.2025-08-03-macos-aarch64/bin/latexmk"
          codesign --display --entitlements - --requirements - "$runtime_root/texlive-2025.2025-08-03-macos-aarch64/bin/latexmk"

          test "$(plutil -extract LSMinimumSystemVersion raw -o - "$app/Contents/Info.plist")" = '15.0'
          test "$(plutil -extract LSMinimumSystemVersion raw -o - "$service/Contents/Info.plist")" = '15.0'
          macho_count=0
          while IFS= read -r executable; do
            if file "$executable" | grep -q 'Mach-O'; then
              macho_count=$((macho_count + 1))
              otool -l "$executable" | grep -q 'LC_BUILD_VERSION'
              test "$(otool -l "$executable" | awk '$1 == "minos" { print $2; exit }')" = '15.0'
            fi
          done < <(find "$app" -type f)
          test "$macho_count" -ge 4

          group_root="$HOME/Library/Group Containers/group.org.setwright.desktop"
          stage_root="$group_root/compile-stages"
          mkdir -p "$stage_root"
          {
            echo "SETWRIGHT_CONTAINMENT_APP=$app"
            echo "SETWRIGHT_XPC_STAGE_ROOT=$stage_root"
            echo "SETWRIGHT_XPC_RUNTIME_ROOT=$runtime_root"
          } >> "$GITHUB_ENV"
          printf 'SETWRIGHT_XPC_REQUIREMENT=%s\n' "$service_requirement" >> "$GITHUB_ENV"
      - name: Run Windows AppContainer hostile fixture
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:SETWRIGHT_RUN_NATIVE_SANDBOX_PROBE = '1'
          $env:SETWRIGHT_PROBE_EVIDENCE = Join-Path $env:RUNNER_TEMP 'sandbox-probe-windows.json'
          cargo test --manifest-path src-tauri/Cargo.toml --test sandbox_containment native_hostile_fixture_containment_remains_incomplete_attestation -- --nocapture
      - name: Run Linux bubblewrap hostile fixture
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          export SETWRIGHT_RUN_NATIVE_SANDBOX_PROBE=1
          export SETWRIGHT_BWRAP_PATH="$RUNNER_TEMP/setwright-bwrap/build/bwrap"
          export SETWRIGHT_BWRAP_VERSION='bubblewrap 0.11.0'
          export SETWRIGHT_BWRAP_SHA256="$(sha256sum "$SETWRIGHT_BWRAP_PATH" | cut -d' ' -f1)"
          export SETWRIGHT_SECCOMP_PATH="$RUNNER_TEMP/setwright-seccomp.bpf"
          export SETWRIGHT_SECCOMP_SHA256="$(sha256sum "$SETWRIGHT_SECCOMP_PATH" | cut -d' ' -f1)"
          export SETWRIGHT_HOSTILE_FIXTURE_PATH="$PWD/tools/sandbox/hostile-fixture/target/x86_64-unknown-linux-musl/debug/sandbox-hostile-fixture"
          export SETWRIGHT_PROBE_EVIDENCE="$RUNNER_TEMP/sandbox-probe-linux.json"
          cargo test --manifest-path src-tauri/Cargo.toml --test sandbox_containment native_hostile_fixture_containment_remains_incomplete_attestation -- --nocapture
      - name: Run macOS XPC hostile fixture
        if: runner.os == 'macOS' && matrix.os != 'macos-14'
        shell: bash
        run: |
          set -euo pipefail
          export SETWRIGHT_RUN_NATIVE_SANDBOX_PROBE=1
          export SETWRIGHT_XPC_BUNDLE="$SETWRIGHT_CONTAINMENT_APP/Contents/XPCServices/SetwrightCompilerXPC.xpc"
          export SETWRIGHT_XPC_SERVICE_NAME='org.setwright.desktop.compiler-xpc'
          export SETWRIGHT_XPC_APP_GROUP='group.org.setwright.desktop'
          export SETWRIGHT_USE_PREINSTALLED_RUNTIME=1
          export SETWRIGHT_HOSTILE_FIXTURE_PATH="$PWD/src-tauri/target/debug/sandbox-hostile-fixture"
          export SETWRIGHT_PROBE_EVIDENCE="$RUNNER_TEMP/sandbox-probe-macos.json"
          "$SETWRIGHT_CONTAINMENT_APP/Contents/MacOS/SetwrightContainment" \
            native_hostile_fixture_containment_remains_incomplete_attestation --nocapture
      - name: Diagnose macOS sandbox failure
        if: failure() && runner.os == 'macOS' && matrix.os != 'macos-14'
        shell: bash
        run: |
          /usr/bin/log show --last 5m --style compact \
            --predicate 'process == "SetwrightCompilerXPC" OR process == "setwright-tex-launcher" OR process == "sandbox-hostile-fixture" OR eventMessage CONTAINS[c] "SetwrightContainment"' \
            || true
      - name: Upload containment-only probe evidence
        if: matrix.os != 'macos-14'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sandbox-probe-${{ matrix.os }}
          path: ${{ runner.temp }}/sandbox-probe-*.json
          if-no-files-found: error
          retention-days: 14
      - name: Preserve the legacy macOS ruleset context during migration
        if: matrix.os == 'macos-14'
        run: echo 'Temporary bridge only; macOS 15 is the supported and tested floor.'

  pdf-fixture:
    name: PDF fixture reproducibility
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Rebuild the representative PDF from its immutable TeX image
        shell: bash
        run: |
          set -euo pipefail
          work="$RUNNER_TEMP/setwright-pdf-fixture"
          cp -R sample-project "$work"
          image='ghcr.io/xu-cheng/texlive-historic-alpine@sha256:73a48f4fc1d3ee7357c8ea5d274af161541c0981432da33339eed7ac1f8e083d'
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --env HOME=/tmp \
            --env SOURCE_DATE_EPOCH=1735689600 \
            --volume "$work:/work" \
            --workdir /work \
            "$image" \
            latexmk -pdf -norc -file-line-error -halt-on-error -interaction=nonstopmode main.tex
          echo '01fe33bf01f3e80ed62ce7e4f281277dfaf6b6d91e3e300b9337d29029faddbb  main.pdf' | \
            (cd "$work" && sha256sum --check --strict -)
          cmp "$work/main.pdf" test/fixtures/pdf/sample-project.pdf

  pdf-browser-floor:
    name: PDF preview floor (Chromium 125)
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.12.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:pdf-e2e
      - name: Resolve the hash-pinned Chrome for Testing archives
        id: chrome
        shell: bash
        run: |
          node --input-type=module <<'NODE' >> "$GITHUB_OUTPUT"
          import manifest from './config/chrome-for-testing.json' with { type: 'json' };
          console.log(`version=${manifest.version}`);
          console.log(`chrome_url=${manifest.chrome.url}`);
          console.log(`chrome_sha256=${manifest.chrome.sha256}`);
          console.log(`driver_url=${manifest.chromedriver.url}`);
          console.log(`driver_sha256=${manifest.chromedriver.sha256}`);
          NODE
      - name: Verify official Chrome for Testing object provenance
        run: node tools/pdf-preview/verify-chrome-for-testing.mjs --online
      - name: Download and verify exact Chrome and ChromeDriver
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/chrome-for-testing"
          curl --fail --location --retry 3 '${{ steps.chrome.outputs.chrome_url }}' -o "$RUNNER_TEMP/chrome.zip"
          curl --fail --location --retry 3 '${{ steps.chrome.outputs.driver_url }}' -o "$RUNNER_TEMP/chromedriver.zip"
          node tools/pdf-preview/verify-chrome-for-testing.mjs \
            --chrome-archive "$RUNNER_TEMP/chrome.zip" \
            --chromedriver-archive "$RUNNER_TEMP/chromedriver.zip"
          unzip -q "$RUNNER_TEMP/chrome.zip" -d "$RUNNER_TEMP/chrome-for-testing"
          unzip -q "$RUNNER_TEMP/chromedriver.zip" -d "$RUNNER_TEMP/chrome-for-testing"
          chmod +x "$RUNNER_TEMP/chrome-for-testing/chrome-linux64/chrome" \
            "$RUNNER_TEMP/chrome-for-testing/chromedriver-linux64/chromedriver"
          echo "SETWRIGHT_CHROME_BINARY=$RUNNER_TEMP/chrome-for-testing/chrome-linux64/chrome" >> "$GITHUB_ENV"
          echo "CHROMEDRIVER_PATH=$RUNNER_TEMP/chrome-for-testing/chromedriver-linux64/chromedriver" >> "$GITHUB_ENV"
      - name: Start the strict-CSP fixture server
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/pdf-preview/chrome-125
          nohup pnpm serve:pdf-e2e > test-results/pdf-preview/chrome-125/server.log 2>&1 &
          echo $! > "$RUNNER_TEMP/setwright-pdf-server.pid"
          for attempt in $(seq 1 50); do
            if curl --fail --silent http://127.0.0.1:4173/ >/dev/null; then exit 0; fi
            sleep 0.2
          done
          cat test-results/pdf-preview/chrome-125/server.log
          exit 1
      - name: Exercise PDF.js at the supported Chromium floor
        env:
          SETWRIGHT_PDF_EVIDENCE: test-results/pdf-preview/chrome-125/evidence.json
          SETWRIGHT_PDF_RESULTS: test-results/pdf-preview/chrome-125
        run: pnpm test:pdf-browser
      - name: Stop fixture server
        if: always()
        shell: bash
        run: |
          if [[ -f "$RUNNER_TEMP/setwright-pdf-server.pid" ]]; then
            kill "$(cat "$RUNNER_TEMP/setwright-pdf-server.pid")" || true
          fi
      - name: Upload browser-floor evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pdf-preview-chromium-${{ steps.chrome.outputs.version }}
          path: test-results/pdf-preview/chrome-125
          if-no-files-found: error
          retention-days: 14

  pdf-preview-native:
    name: PDF preview (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2022
          - ubuntu-22.04
          - macos-15
          - macos-15-intel
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      MACOSX_DEPLOYMENT_TARGET: '15.0'
      SETWRIGHT_PDF_EVIDENCE: test-results/pdf-preview/native/evidence.json
      SETWRIGHT_PDF_RESULTS: test-results/pdf-preview/native
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Linux desktop test libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xvfb dbus-x11
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.12.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.95.0
      - run: pnpm install --frozen-lockfile
      - name: Build the feature-gated native test application
        if: runner.os != 'macOS'
        run: pnpm tauri build --no-bundle --features pdf-preview-e2e --config src-tauri/tauri.e2e.conf.json --ci
      - name: Build the feature-gated macOS test bundle
        if: runner.os == 'macOS'
        run: pnpm tauri build --features pdf-preview-e2e --bundles app --config src-tauri/tauri.e2e.conf.json --config '{"bundle":{"active":true}}' --ci
      - name: Inspect the macOS deployment floor
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          app='src-tauri/target/release/bundle/macos/Setwright.app'
          test "$(plutil -extract LSMinimumSystemVersion raw -o - "$app/Contents/Info.plist")" = '15.0'
          executable_name="$(plutil -extract CFBundleExecutable raw -o - "$app/Contents/Info.plist")"
          test -x "$app/Contents/MacOS/$executable_name"
          echo "SETWRIGHT_E2E_BINARY=$PWD/$app/Contents/MacOS/$executable_name" >> "$GITHUB_ENV"
          macho_count=0
          while IFS= read -r executable; do
            if file "$executable" | grep -q 'Mach-O'; then
              macho_count=$((macho_count + 1))
              otool -l "$executable" | grep -q 'LC_BUILD_VERSION'
              test "$(otool -l "$executable" | awk '$1 == "minos" { print $2; exit }')" = '15.0'
            fi
          done < <(find "$app" -type f)
          test "$macho_count" -ge 1
      - name: Exercise native PDF preview
        if: runner.os != 'Linux'
        run: pnpm test:pdf-native
      - name: Exercise native PDF preview under Xvfb
        if: runner.os == 'Linux'
        env:
          WEBKIT_DISABLE_COMPOSITING_MODE: '1'
        run: dbus-run-session -- xvfb-run --auto-servernum --server-args='-screen 0 1440x920x24' pnpm test:pdf-native
      - name: Rebuild and scan the production-negative boundary
        shell: bash
        run: |
          pnpm build
          cargo build --locked --release --manifest-path src-tauri/Cargo.toml --no-default-features --features custom-protocol --bin setwright-desktop
          if [[ "$RUNNER_OS" == 'Windows' ]]; then
            export SETWRIGHT_PRODUCTION_BINARY='src-tauri/target/release/setwright-desktop.exe'
          else
            export SETWRIGHT_PRODUCTION_BINARY='src-tauri/target/release/setwright-desktop'
          fi
          node tools/pdf-preview/check-production-boundary.mjs --require-binary
      - name: Upload native PDF evidence and failure screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pdf-preview-${{ matrix.os }}
          path: test-results/pdf-preview/native
          if-no-files-found: warn
          retention-days: 14

  schemas:
    name: Public schema examples
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.12.0
      - name: Parse all JSON assets
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            node -e 'JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8"))' "$file"
          done < <(find schemas templates sample-project -name '*.json' -print0)
      - name: Validate examples against Draft 2020-12 schemas
        shell: bash
        run: |
          npx --yes --package ajv-cli@5.0.0 --package ajv-formats@3.0.1 ajv validate --spec=draft2020 -c ajv-formats -s schemas/paper-settings.schema.json -d schemas/examples/paper-settings.v1.json
          npx --yes --package ajv-cli@5.0.0 --package ajv-formats@3.0.1 ajv validate --spec=draft2020 -c ajv-formats -s schemas/review-bundle.schema.json -d schemas/examples/review-bundle.v1.json
          npx --yes --package ajv-cli@5.0.0 --package ajv-formats@3.0.1 ajv validate --spec=draft2020 -c ajv-formats -s schemas/runtime-manifest.schema.json -d schemas/examples/runtime-manifest.v1.example.json
          npx --yes --package ajv-cli@5.0.0 --package ajv-formats@3.0.1 ajv validate --spec=draft2020 -c ajv-formats -s schemas/arxiv-preflight-report.schema.json -d schemas/examples/arxiv-preflight-report.v1.json
          for settings in templates/*/paper-settings.json sample-project/paper-settings.json; do
            npx --yes --package ajv-cli@5.0.0 --package ajv-formats@3.0.1 ajv validate --spec=draft2020 -c ajv-formats -s schemas/paper-settings.schema.json -d "$settings"
          done

  latex-smoke:
    name: LaTeX smoke (${{ matrix.project }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        project:
          - templates/generic
          - templates/acm
          - templates/ieee
          - sample-project
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: xu-cheng/latex-action@6549dc21effb2730855a1281407ecfcececc6c1b # v4.1.0
        with:
          # Immutable TeX Live 2025 multi-platform image index.
          docker_image: ghcr.io/xu-cheng/texlive-historic-alpine@sha256:73a48f4fc1d3ee7357c8ea5d274af161541c0981432da33339eed7ac1f8e083d
          root_file: main.tex
          working_directory: ${{ matrix.project }}
          args: -pdf -norc -file-line-error -halt-on-error -interaction=nonstopmode
      - name: Explain scope
        run: echo "This is a template smoke test, not managed-runtime, sandbox, or arXiv acceptance evidence."
