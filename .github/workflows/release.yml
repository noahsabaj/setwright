name: Draft release candidate

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing signed version tag to package (for example v0.1.0)
        required: true
        type: string
      prerelease:
        description: Mark the draft as a prerelease
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  preflight:
    name: Verify release inputs
    runs-on: ubuntu-22.04
    environment: release
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Require a version tag at the selected commit
        shell: bash
        run: |
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]] || {
            echo "::error::tag must be a v-prefixed semantic version"
            exit 1
          }
          tag_commit="$(git rev-list -n 1 "$RELEASE_TAG")"
          [[ -n "$tag_commit" && "$tag_commit" == "$GITHUB_SHA" ]] || {
            echo "::error::$RELEASE_TAG must exist and point to workflow commit $GITHUB_SHA"
            exit 1
          }
      - name: Require installer signing and notarization credentials
        shell: bash
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          required=(
            WINDOWS_CERTIFICATE WINDOWS_CERTIFICATE_PASSWORD
            APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY
            APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID
          )
          for name in "${required[@]}"; do
            [[ -n "${!name}" ]] || {
              echo "::error::release environment secret $name is missing"
              exit 1
            }
          done
      - name: Preserve the external-gate boundary
        shell: bash
        run: |
          if grep -q '| Open |' docs/release-readiness.md; then
            echo "::warning::Release-readiness gates remain open. Artifacts will stay draft-only."
          fi

  package:
    name: Package ${{ matrix.label }}
    needs: preflight
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64 NSIS
            os: windows-2022
            tauri_args: --bundles nsis
            attest_path: src-tauri/target/release/bundle/nsis/*.exe
          - label: macOS Intel DMG
            os: macos-15-intel
            rust_target: x86_64-apple-darwin
            tauri_args: --target x86_64-apple-darwin --bundles dmg
            attest_path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - label: macOS Apple Silicon DMG
            os: macos-15
            rust_target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin --bundles dmg
            attest_path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - label: Linux x64 AppImage and deb
            os: ubuntu-22.04
            tauri_args: --bundles appimage,deb
            attest_path: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install Linux desktop libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.95.0
      - name: Install selected macOS target
        if: runner.os == 'macOS'
        run: rustup target add ${{ matrix.rust_target }}
      - name: Install locked dependencies
        shell: bash
        run: |
          test -f pnpm-lock.yaml || {
            echo "::error::A release requires committed pnpm-lock.yaml"
            exit 1
          }
          pnpm install --frozen-lockfile --ignore-scripts
      - name: Import Windows Authenticode certificate
        if: runner.os == 'Windows'
        id: windows_signing
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP 'setwright-signing.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $password
          if (-not $certificate.Thumbprint) { throw 'The Windows signing certificate could not be imported.' }
          $configPath = Join-Path $env:RUNNER_TEMP 'windows-signing.json'
          @{
            bundle = @{
              windows = @{
                certificateThumbprint = $certificate.Thumbprint
                digestAlgorithm = 'sha256'
                timestampUrl = 'http://timestamp.digicert.com'
              }
            }
          } | ConvertTo-Json -Depth 5 | Set-Content -Encoding utf8 $configPath
          "config_arg=--config $configPath" >> $env:GITHUB_OUTPUT
          Remove-Item -LiteralPath $pfxPath -Force
      - name: Import macOS Developer ID certificate
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          certificate_path="$RUNNER_TEMP/setwright-signing.p12"
          keychain_path="$RUNNER_TEMP/setwright-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          printf '%s' "$APPLE_CERTIFICATE" | openssl base64 -d -A -out "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" login.keychain-db
          rm -f "$certificate_path"
      - name: Package signed Windows installer
        if: runner.os == 'Windows'
        uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: Setwright ${{ inputs.tag }}
          releaseBody: Draft artifacts only. Publication requires the evidence in docs/release-readiness.md.
          releaseDraft: true
          prerelease: ${{ inputs.prerelease }}
          args: ${{ matrix.tauri_args }} ${{ steps.windows_signing.outputs.config_arg }}
      - name: Package signed and notarized macOS installer
        if: runner.os == 'macOS'
        uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: Setwright ${{ inputs.tag }}
          releaseBody: Draft artifacts only. Publication requires the evidence in docs/release-readiness.md.
          releaseDraft: true
          prerelease: ${{ inputs.prerelease }}
          args: ${{ matrix.tauri_args }}
      - name: Package Linux installers
        if: runner.os == 'Linux'
        uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: Setwright ${{ inputs.tag }}
          releaseBody: Draft artifacts only. Publication requires the evidence in docs/release-readiness.md.
          releaseDraft: true
          prerelease: ${{ inputs.prerelease }}
          args: ${{ matrix.tauri_args }}
      - name: Sign build-provenance attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: ${{ matrix.attest_path }}
      - name: Remove temporary macOS keychain
        if: ${{ always() && runner.os == 'macOS' }}
        shell: bash
        run: security delete-keychain "$RUNNER_TEMP/setwright-signing.keychain-db" || true
