name: DCO

on:
  pull_request:

permissions:
  contents: read

jobs:
  signoff:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Require Signed-off-by in every pull request commit
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          missing=0
          while IFS= read -r commit; do
            author_name="$(git show -s --format=%an "$commit")"
            author_email="$(git show -s --format=%ae "$commit")"
            expected="Signed-off-by: $author_name <$author_email>"
            dependabot_expected="Signed-off-by: dependabot[bot] <support@github.com>"
            if [[ "$PR_AUTHOR" == "dependabot[bot]" &&
                  "$author_name" == "dependabot[bot]" &&
                  "$author_email" == "49699333+dependabot[bot]@users.noreply.github.com" ]] &&
               git show -s --format=%B "$commit" |
                 grep -Fxiq "$dependabot_expected"; then
              continue
            fi
            if ! git show -s --format=%B "$commit" |
              awk -v expected="$expected" 'BEGIN { found = 0 } tolower($0) == tolower(expected) { found = 1 } END { exit !found }'; then
              echo "::error::Commit $commit must contain a Signed-off-by trailer matching its author: $expected"
              missing=1
            fi
          done < <(git rev-list "$BASE_SHA..$HEAD_SHA")
          exit "$missing"
