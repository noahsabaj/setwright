version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      eslint-tooling:
        patterns:
          - "@eslint/*"
          - eslint
          - "eslint-*"
          - globals
          - typescript-eslint
      tiptap:
        patterns:
          - "@tiptap/*"
      vite-toolchain:
        patterns:
          - "@vitejs/*"
          - vite
          - vitest
      wdio-toolchain:
        patterns:
          - "@wdio/*"
          - webdriverio
          - "@types/mocha"
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      wdio-toolchain:
        patterns:
          - tauri-plugin-wdio
          - tauri-plugin-wdio-webdriver
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
