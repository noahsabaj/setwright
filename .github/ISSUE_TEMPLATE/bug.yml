name: Bug report
description: Report a reproducible Setwright problem using non-sensitive data.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Never upload a private paper or security exploit here. Use the private security reporting link for a vulnerability.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Use the smallest synthetic or permissively licensed project possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Logs or additional verification
      description: Remove paths, usernames, paper text, tokens, and other sensitive data.
